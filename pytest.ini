[pytest]
minversion = 7.0
addopts = --strict-markers --junit-xml=reports/junit.xml
testpaths = tests
python_files = test_*.py
markers =
    smoke: quick repo health validations that run before anything else.
    functional: exercise schema and business rules against canonical data.
    regression: ensure historical bad bundles keep failing in known ways.
    uat: release-decision guards and end-to-end expectation readiness.
    defect_triage: maps failed runs back to root-cause/event categories.
