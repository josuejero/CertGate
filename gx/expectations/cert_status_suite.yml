expectation_suite_name: cert_status_suite
data_asset_type: pandas
meta:
  notes: Certification status expectations to capture uniqueness and valid mappings.
  contributors:
    - CertGate QA
  great_expectations_version: "0.17.0"
ge_cloud_id: null
evaluation_parameters: {}
expectations:
  - expectation_type: expect_table_columns_to_match_ordered_list
    kwargs:
      column_list:
        - cert_status_id
        - candidate_id
        - certification_level
        - certification_status
        - certified_ts
        - status_source
        - status_effective_ts
  - expectation_type: expect_column_values_to_not_be_null
    kwargs:
      column: cert_status_id
  - expectation_type: expect_column_values_to_not_be_null
    kwargs:
      column: candidate_id
  - expectation_type: expect_column_values_to_be_unique
    kwargs:
      column: cert_status_id
  - expectation_type: expect_compound_columns_to_be_unique
    kwargs:
      column_list:
        - candidate_id
        - certification_level
  - expectation_type: expect_column_values_to_be_in_set
    kwargs:
      column: certification_status
      value_set:
        - Certified
        - Certification Granted
        - NeedsReview
        - Certification Pending
        - Not Certified
  - expectation_type: expect_column_values_to_not_be_null
    kwargs:
      column: certification_level
  - expectation_type: expect_column_values_to_not_be_null
    kwargs:
      column: certification_status
